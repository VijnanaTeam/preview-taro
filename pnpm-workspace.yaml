# pnpm 10.10+/11 起，overrides、onlyBuiltDependencies 等设置从 package.json 的
# "pnpm" 字段迁移到这里。https://pnpm.io/settings

# webpack 必须锁 5.78.0，新版 webpack 的 ProgressPlugin schema 与 Taro 3.6.34 不兼容
overrides:
  webpack: 5.78.0

# 声明式放行需要执行 build script 的原生依赖（替代交互式 pnpm approve-builds）
onlyBuiltDependencies:
  - '@swc/core'
  - '@tarojs/binding'
  - core-js
  - core-js-pure
  - esbuild
  - swiper

# pnpm 11 默认开启供应链冷却（minimumReleaseAge=1440 分钟/1 天）。
# electron-to-chromium 是 browserslist 的浏览器版本数据、几乎每天发版，
# 常因「太新」被拦。对它单独豁免即可，其余依赖仍享受 1 天冷却。
minimumReleaseAgeExclude:
  - electron-to-chromium
